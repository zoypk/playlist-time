name: Post-deploy smoke

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ github.event.deployment.environment || github.event.deployment.ref || github.ref }}
  cancel-in-progress: true

jobs:
  demo-smoke:
    name: Demo route smoke
    if: >-
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment_status.environment_url ||
      github.event.deployment_status.target_url)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun downloads
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          echo "::group::bun install"
          trap 'echo "::endgroup::"' EXIT
          bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chromium
        run: |
          echo "::group::Install Playwright Chromium"
          trap 'echo "::endgroup::"' EXIT
          bunx playwright install --with-deps chromium

      - name: Smoke test demo route
        env:
          SMOKE_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
        run: |
          echo "::group::Run demo smoke"
          trap 'echo "::endgroup::"' EXIT
          bun run smoke:demo

      - name: Add job summary
        if: always()
        env:
          SMOKE_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
        run: |
          echo "### Post-deploy smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${SMOKE_BASE_URL}/?demo=1" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`bun run smoke:demo\`" >> "$GITHUB_STEP_SUMMARY"
