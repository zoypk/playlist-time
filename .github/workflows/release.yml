name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun downloads
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          echo "::group::bun install"
          trap 'echo "::endgroup::"' EXIT
          bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Check
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Generate release title
        id: release-title
        run: |
          title="$(node scripts/release-title.mjs "${GITHUB_REF_NAME}")"
          echo "title=${title}" >> "$GITHUB_OUTPUT"
          echo "### Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Title: ${title}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${{ steps.release-title.outputs.title }}" \
            --generate-notes \
            --verify-tag
