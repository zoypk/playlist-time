name: Bug report
description: Report broken behavior in playlist-time.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include real API keys, private playlist data, or credentials. For vulnerabilities, use SECURITY.md instead of a public issue.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include a public playlist or demo-mode steps when possible.
      placeholder: |
        1. Open ...
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Chrome 126 on Windows 11"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots are okay if they do not expose secrets or private data.
